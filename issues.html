<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Issues - CivicTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CivicTrack</a>
      <a href="user.html" class="btn btn-outline-light">Report Issue</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold text-dark mb-0">
            <i class="bi bi-list-check me-2 text-success"></i>All Issues
            <span id="issueCount" class="badge bg-secondary ms-2">0</span>
          </h2>
          <a href="admin-login.html" class="btn btn-outline-primary">
            <i class="bi bi-shield-lock me-1"></i>Admin
          </a>
        </div>

        <!-- Filters -->
        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <select id="statusFilter" class="form-select">
                  <option value="">All Status</option>
                  <option value="Pending">Pending</option>
                  <option value="Processing">Processing</option>
                  <option value="Completed">Completed</option>
                  <option value="Rejected">Rejected</option>
                </select>
              </div>
              <div class="col-md-3">
                <select id="priorityFilter" class="form-select">
                  <option value="">All Priority</option>
                  <option value="High">High</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Issues List -->
        <div id="issuesContainer">
          <div class="text-center py-5">
            <i class="bi bi-inbox display-1 text-muted mb-3"></i>
            <h4 class="text-muted">No issues reported yet</h4>
            <p class="text-muted">Be the first to report a civic issue!</p>
            <a href="user.html" class="btn btn-primary">Report First Issue</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script>
    const utils = window.CivicTrackUtils;
    let allReports = [];

    function renderIssues(reports = allReports) {
      const container = document.getElementById('issuesContainer');
      const filteredReports = applyFilters(reports);
      
      document.getElementById('issueCount').textContent = filteredReports.length;
      
      if (filteredReports.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5">
            <i class="bi bi-search display-1 text-muted mb-3"></i>
            <h4 class="text-muted">No issues match your filters</h4>
            <p class="text-muted">Try adjusting the filters above</p>
            <button class="btn btn-outline-secondary" onclick="clearFilters()">Clear Filters</button>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredReports.map(report => `
        <div class="issue-card card shadow-sm mb-4">
          <div class="card-body">
            <div class="row">
              <div class="col-md-3">
                ${report.images[0] ? `<img src="${report.images[0]}" class="img-fluid rounded shadow" alt="Issue image">` : 
                  '<div class="bg-light rounded d-flex align-items-center justify-content-center" style="height:180px"><i class="bi bi-camera-fill text-muted fs-1"></i></div>'}
              </div>
              <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <h5 class="fw-bold text-dark mb-1">${report.category}</h5>
                  <span class="badge status-badge ${utils.getStatusClass(report.status)}">${report.status}</span>
                </div>
                
                <p class="text-muted mb-3">${report.description}</p>
                
                <div class="row text-small mb-2">
                  <div class="col-6">
                    <i class="bi bi-geo-alt me-1"></i>
                    <span class="fw-semibold" title="${report.locationType ? `Type: ${report.locationType}` : ''}">
                      ${report.locationLabel}
                      ${report.locationType ? ` <small class="text-muted">(${report.locationType[0].toUpperCase()})</small>` : ''}
                    </span>
                  </div>
                  <div class="col-6">
                    <i class="bi bi-clock me-1"></i>
                    ${utils.formatTimestamp(report.timestamp)}
                  </div>
                </div>
                
                <div class="row text-small">
                  <div class="col-6">
                    <i class="bi bi-star-fill text-warning me-1"></i>
                    <span class="fw-semibold">${report.priority}</span>
                  </div>
                  <div class="col-6">
                    <i class="bi bi-arrow-clockwise me-1"></i>
                    Updated: ${utils.formatTimestamp(report.lastUpdated)}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function applyFilters(reports) {
      const statusFilter = document.getElementById('statusFilter').value;
      const priorityFilter = document.getElementById('priorityFilter').value;
      
      return reports.filter(report => {
        return (!statusFilter || report.status === statusFilter) &&
               (!priorityFilter || report.priority === priorityFilter);
      });
    }

    function clearFilters() {
      document.getElementById('statusFilter').value = '';
      document.getElementById('priorityFilter').value = '';
      renderIssues();
    }

    // Filter events
    document.getElementById('statusFilter').addEventListener('change', () => renderIssues());
    document.getElementById('priorityFilter').addEventListener('change', () => renderIssues());

    // Initial load + real-time sync
    function refreshData() {
      allReports = utils.getReports();
      renderIssues();
    }

    // Real-time sync
    utils.initStorageSync(refreshData);
    refreshData(); // Initial load
  </script>
</body>
</html>
