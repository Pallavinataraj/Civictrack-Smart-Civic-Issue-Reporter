<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicTrack - Smart Civic Issue Reporter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-10 text-center mb-5">
        <h1 class="display-4 fw-bold text-primary mb-4">CivicTrack</h1>
        <p class="lead text-muted">Smart Civic Issue Reporting System</p>
      </div>
    </div>
    
    <div class="row g-4">
      <!-- Report Issue Card -->
      <div class="col-md-4">
        <a href="user.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 hover-lift">
            <div class="card-body text-center p-4">
              <div class="icon mb-3">
                <i class="bi bi-exclamation-triangle-fill display-4 text-warning"></i>
              </div>
              <h3 class="card-title fw-bold text-dark mb-2">Report Issue</h3>
              <p class="text-muted">Report civic issues in your area</p>
              <button class="btn btn-primary btn-lg">Get Started</button>
            </div>
          </div>
        </a>
      </div>

      <!-- View All Issues Card -->
      <div class="col-md-4">
        <a href="issues.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 hover-lift">
            <div class="card-body text-center p-4">
              <div class="icon mb-3">
                <i class="bi bi-list-check display-4 text-success"></i>
              </div>
              <h3 class="card-title fw-bold text-dark mb-2">All Issues</h3>
              <p class="text-muted">View all reported issues</p>
              <button class="btn btn-success btn-lg">View Issues</button>
            </div>
          </div>
        </a>
      </div>

      <!-- Admin Login Card -->
      <div class="col-md-4">
        <a href="admin-login.html" class="text-decoration-none">
          <div class="card h-100 shadow-sm border-0 hover-lift">
            <div class="card-body text-center p-4">
              <div class="icon mb-3">
                <i class="bi bi-shield-lock-fill display-4 text-info"></i>
              </div>
              <h3 class="card-title fw-bold text-dark mb-2">Admin Login</h3>
              <p class="text-muted">Admin dashboard access</p>
              <button class="btn btn-info btn-lg">Admin Login</button>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.js"></script>
</body>
</html>
