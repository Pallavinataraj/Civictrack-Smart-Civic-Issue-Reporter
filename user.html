<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue - CivicTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CivicTrack</a>
      <a href="issues.html" class="btn btn-outline-light ms-auto">View Issues</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-lg border-0">
          <div class="card-header text-white text-center py-4" style="background: linear-gradient(90deg, #28a745, #20c997);">
            <h2 class="mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Report Civic Issue</h2>
            <p class="mb-0 opacity-100">Help make our city better</p>
          </div>
          <div class="card-body p-5">
            <form id="issueForm">
              <!-- Category -->
              <div class="form-floating mb-4">
                <select class="form-select" id="category" required>
                  <option value="">Select Category</option>
                  <option value="Garbage">Garbage Collection</option>
                  <option value="Road">Road/Pothole</option>
                  <option value="Water">Water Supply/Leakage</option>
                  <option value="Electricity">Electricity</option>
                </select>
                <label for="category">Category</label>
              </div>

              <!-- Description -->
              <div class="form-floating mb-4">
                <textarea class="form-control" id="description" rows="4" placeholder="Describe the issue..." required></textarea>
                <label for="description">Description</label>
              </div>

              <!-- Images -->
              <div class="mb-4">
                <label class="form-label fw-bold">Upload Images (Optional)</label>
                <input type="file" class="form-control" id="images" accept="image/*" multiple>
                <div id="imagePreview" class="mt-3"></div>
              </div>

              <!-- Location -->
              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <label class="form-label fw-bold">Location</label>
                  <button type="button" id="getLocation" class="btn btn-outline-primary">
                    <i class="bi bi-geo-alt me-1"></i>Get Current Location
                  </button>
                </div>
                <div class="mb-3">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="locationType" id="liveLocation" value="live" checked>
                    <label class="form-check-label" for="liveLocation">
                      Live GPS Location
                    </label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="locationType" id="manualLocation" value="manual">
                    <label class="form-check-label" for="manualLocation">
                      Manual Location Entry
                    </label>
                  </div>
                </div>
                <div id="manualLocationFields" style="display: none;">
                  <div class="row mb-3">
                    <div class="col-md-4">
                      <input type="text" class="form-control" id="placeName" placeholder="Place/Town">
                    </div>
                    <div class="col-md-4">
                      <input type="text" class="form-control" id="district" placeholder="District">
                    </div>
                    <div class="col-md-4">
                      <input type="text" class="form-control" id="state" placeholder="State">
                    </div>
                  </div>
                </div>
                <div id="map-preview">
                  <i class="bi bi-geo-alt me-2"></i>Click button for GPS location or select Manual
                </div>
                <div id="locationInfo" class="mt-2 small text-muted" style="display:none;"></div>
              </div>

              <input type="hidden" id="latitude">
              <input type="hidden" id="longitude">
              <input type="hidden" id="locationTypeHidden">
              <input type="hidden" id="placeNameHidden">
              <input type="hidden" id="districtHidden">
              <input type="hidden" id="stateHidden">

              <!-- Priority (auto-detected, shown) -->
              <div class="mb-4">
                <label class="form-label fw-bold">Detected Priority:</label>
                <span id="priorityLabel" class="badge bg-secondary fs-6 px-3 py-2">Select category first</span>
              </div>

              <!-- Submit -->
              <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-lg">
                <i class="bi bi-send-fill me-2"></i>Submit Report
              </button>
            </form>
          </div>
        </div>

        <!-- Success Message -->
        <div id="successMsg" class="alert alert-success mt-4 d-none" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          Issue reported successfully! <a href="issues.html" class="alert-link">View all issues</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script>
    const utils = window.CivicTrackUtils;
    
    // Image preview
    document.getElementById('images').addEventListener('change', function(e) {
      const preview = document.getElementById('imagePreview');
      preview.innerHTML = '';
      Promise.all(Array.from(e.target.files).map(convertToBase64)).then(base64Images => {
        base64Images.forEach(img => {
          const imgEl = document.createElement('img');
          imgEl.src = img;
          imgEl.className = 'image-preview';
          preview.appendChild(imgEl);
        });
      });
    });

    function convertToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Location type toggle
    document.querySelectorAll('input[name="locationType"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const manualFields = document.getElementById('manualLocationFields');
        if (this.value === 'manual') {
          manualFields.style.display = 'block';
          document.getElementById('getLocation').style.display = 'none';
        } else {
          manualFields.style.display = 'none';
          document.getElementById('getLocation').style.display = 'inline-block';
        }
        updateHiddenFields();
      });
    });

    // Get location (live GPS)
    document.getElementById('getLocation').addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('Geolocation not supported');
        return;
      }
      document.getElementById('liveLocation').checked = true;
      document.getElementById('manualLocationFields').style.display = 'none';
      navigator.geolocation.getCurrentPosition(success, error);
    });

    function success(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lng;
      updateHiddenFields();
      
      document.getElementById('map-preview').innerHTML = `
        <i class="bi bi-geo-alt-fill text-success me-2"></i>
        Live GPS: ${lat.toFixed(4)}, ${lng.toFixed(4)}
      `;
      document.getElementById('map-preview').classList.add('bg-success-subtle', 'border-success');
      document.getElementById('locationInfo').style.display = 'block';
      document.getElementById('locationInfo').textContent = 'Live GPS location captured';
    }

    function error() {
      alert('Unable to get location. Using approximate.');
      document.getElementById('latitude').value = 40.7128;
      document.getElementById('longitude').value = -74.0060;
      updateHiddenFields();
    }

    function updateHiddenFields() {
      const type = document.querySelector('input[name="locationType"]:checked')?.value || 'live';
      document.getElementById('locationTypeHidden').value = type;
      document.getElementById('placeNameHidden').value = document.getElementById('placeName').value;
      document.getElementById('districtHidden').value = document.getElementById('district').value;
      document.getElementById('stateHidden').value = document.getElementById('state').value;
    }

    // Manual fields change
    ['placeName', 'district', 'state'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateHiddenFields);
    });

    // Auto priority
    document.getElementById('category').addEventListener('change', function() {
      const category = this.value;
      if (category) {
        const priority = utils.detectPriority(category);
        document.getElementById('priorityLabel').textContent = priority;
        document.getElementById('priorityLabel').className = `badge bg-${priority === 'High' ? 'danger' : priority === 'Medium' ? 'warning' : 'success'} fs-6 px-3 py-2`;
      }
    });

    // Form submit (enhanced location)
    document.getElementById('issueForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const imagesInput = document.getElementById('images');
      const base64Images = imagesInput.files.length ? Array.from(imagesInput.files).map(convertToBase64) : [];
      
      await Promise.all(base64Images).then(async (images) => {
        // Build locationData
        const lat = parseFloat(document.getElementById('latitude').value) || null;
        const lng = parseFloat(document.getElementById('longitude').value) || null;
        const locationType = document.getElementById('locationTypeHidden').value || 'live';
        const placeName = document.getElementById('placeNameHidden').value;
        const district = document.getElementById('districtHidden').value;
        const state = document.getElementById('stateHidden').value;
        
        const locationData = {
          latitude: lat,
          longitude: lng,
          locationType,
          placeName,
          district,
          state
        };
        
        const report = await utils.createReport(
          document.getElementById('category').value,
          document.getElementById('description').value,
          images,
          locationData
        );
        
        const reports = utils.getReports();
        reports.unshift(report);
        utils.saveReports(reports);
        
        // Show success
        document.getElementById('issueForm').classList.add('d-none');
        document.getElementById('successMsg').classList.remove('d-none');
        
        // Reset form
        this.reset();
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('map-preview').innerHTML = '<i class="bi bi-geo-alt me-2"></i>Click button for GPS location or select Manual';
        document.getElementById('map-preview').classList.remove('bg-success-subtle', 'border-success');
        document.getElementById('locationInfo').style.display = 'none';
        document.getElementById('manualLocationFields').style.display = 'none';
        document.getElementById('liveLocation').checked = true;
        document.getElementById('priorityLabel').textContent = 'Select category first';
        document.getElementById('priorityLabel').className = 'badge bg-secondary fs-6 px-3 py-2';
      });
    });
  </script>
</body>
</html>
