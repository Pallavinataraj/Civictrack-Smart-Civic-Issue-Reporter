<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CivicTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
          <div class="card-body p-5 text-center">
            <div class="mb-4">
              <i class="bi bi-shield-lock-fill display-1 text-primary mb-3"></i>
              <h2 class="fw-bold text-dark mb-1">Admin Login</h2>
              <p class="text-muted">Enter credentials to access dashboard</p>
            </div>

            <form id="loginForm">
              <div class="form-floating mb-4">
                <input type="text" class="form-control" id="username" placeholder="Username" required>
                <label for="username">Username</label>
              </div>

              <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password">Password</label>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-lg mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
              </button>

              <div class="alert alert-info small" role="alert">
                <i class="bi bi-info-circle me-1"></i>
                Default: <strong>admin</strong> / <strong>admin123</strong>
              </div>
            </form>

            <div id="errorMsg" class="alert alert-danger mt-3 d-none" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              Invalid credentials!
            </div>

            <div id="successMsg" class="alert alert-success mt-3 d-none" role="alert">
              <i class="bi bi-check-circle-fill me-2"></i>
              Login successful! Redirecting...
            </div>
          </div>
        </div>

        <div class="text-center mt-4">
          <a href="index.html" class="text-muted text-decoration-none">
            ← Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script>
    const utils = window.CivicTrackUtils;

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // Hardcoded credentials
      if (username === 'admin' && (password === 'admin123' || password === 'Adam@12345')) {
        utils.adminLogin();
        document.getElementById('errorMsg').classList.add('d-none');
        document.getElementById('successMsg').classList.remove('d-none');
        document.querySelector('button[type="submit"]').textContent = 'Redirecting...';
        document.querySelector('button[type="submit"]').disabled = true;
        
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);
      } else {
        document.getElementById('successMsg').classList.add('d-none');
        document.getElementById('errorMsg').classList.remove('d-none');
        this.reset();
      }
    });
  </script>
</body>
</html>
